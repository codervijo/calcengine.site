<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" width="680" height="160" font-family="Inter, system-ui, sans-serif" role="img" aria-label="JSON size calculation flow: JSON string parsed and UTF-8 encoded to produce byte count and KB">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- JSON Input -->
  <rect x="16" y="50" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="81" y="71" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">JSON String</text>
  <text x="81" y="89" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="monospace">{"key":"val"}</text>

  <!-- Arrow -->
  <line x1="146" y1="76" x2="188" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Parse + Validate -->
  <rect x="188" y="50" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="253" y="71" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Parse + Validate</text>
  <text x="253" y="89" text-anchor="middle" font-size="10" fill="#3b82f6">JSON.parse()</text>

  <!-- Arrow -->
  <line x1="318" y1="76" x2="360" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UTF-8 Encode -->
  <rect x="360" y="50" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="71" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">UTF-8 Encode</text>
  <text x="425" y="89" text-anchor="middle" font-size="10" fill="#3b82f6">new Blob([str])</text>

  <!-- Arrow -->
  <line x1="490" y1="76" x2="532" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="532" y="50" width="132" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="598" y="69" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="500">Bytes  /  KB</text>
  <text x="598" y="89" text-anchor="middle" font-size="14" fill="white" font-weight="700">50 B · 0.05 KB</text>
</svg>
