<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Lambda cost calculation flow diagram: memory, duration, and invocations feed into execution cost; invocations feed into request cost; both sum to total monthly cost">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="4" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">COMPUTE</text>
  <text x="4" y="178" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">REQUESTS</text>

  <!-- ══ COMPUTE ROW ══ -->
  <!-- Memory (MB) -->
  <rect x="60" y="48" width="110" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Memory (MB)</text>
  <text x="115" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 512 MB</text>

  <!-- Duration (ms) -->
  <rect x="184" y="48" width="110" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="239" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Duration (ms)</text>
  <text x="239" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 200 ms</text>

  <!-- Arrow: memory + duration → GB-seconds → execution cost -->
  <line x1="294" y1="74" x2="348" y2="74" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="321" y="65" text-anchor="middle" font-size="9.5" fill="#64748b">÷1024 ÷1000</text>
  <text x="321" y="87" text-anchor="middle" font-size="9.5" fill="#64748b">× invocations</text>

  <!-- Execution Cost -->
  <rect x="348" y="48" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Execution Cost</text>
  <text x="410" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">GB-s × $0.0000167</text>

  <!-- ══ REQUEST ROW ══ -->
  <!-- Invocations -->
  <rect x="60" y="144" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="166" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Invocations</text>
  <text x="122" y="184" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,000,000</text>

  <!-- Arrow: invocations → request cost -->
  <line x1="184" y1="170" x2="348" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="266" y="161" text-anchor="middle" font-size="9.5" fill="#64748b">÷ 1,000,000</text>
  <text x="266" y="183" text-anchor="middle" font-size="9.5" fill="#64748b">× $0.20 / 1M req</text>

  <!-- Request Cost -->
  <rect x="348" y="144" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="166" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Request Cost</text>
  <text x="410" y="184" text-anchor="middle" font-size="11" fill="#3b82f6">invocations × rate</text>

  <!-- ══ CONVERGENCE ══ -->
  <line x1="472" y1="74" x2="530" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="472" y1="170" x2="530" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="530" y1="112" x2="566" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- + label at merge -->
  <circle cx="530" cy="112" r="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="530" y="117" text-anchor="middle" font-size="14" fill="#64748b" font-weight="500">+</text>

  <!-- ══ TOTAL COST ══ -->
  <rect x="566" y="86" width="144" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="638" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Monthly Cost</text>
  <text x="638" y="127" text-anchor="middle" font-size="16" fill="white" font-weight="700">$1.87 / mo</text>
</svg>
