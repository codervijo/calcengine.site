<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Payload size calculation flow diagram: record size times records per request equals payload bytes, divided by 1024 to get size in KB or MB">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="12" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RECORD</text>
  <text x="12" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">COUNT</text>

  <!-- ══ INPUT ROW 1 ══ -->
  <rect x="58" y="48" width="136" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="126" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Record Size</text>
  <text x="126" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 512 bytes</text>

  <!-- Line: record size → multiply circle -->
  <line x1="194" y1="74" x2="255" y2="106" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ INPUT ROW 2 ══ -->
  <rect x="58" y="124" width="136" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="126" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Records / Req</text>
  <text x="126" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 100</text>

  <!-- Line: records per request → multiply circle -->
  <line x1="194" y1="150" x2="255" y2="118" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ MULTIPLY NODE ══ -->
  <circle cx="270" cy="112" r="15" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="117" text-anchor="middle" font-size="15" fill="#64748b" font-weight="600">×</text>

  <!-- Arrow: multiply → payload bytes box -->
  <line x1="285" y1="112" x2="316" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ PAYLOAD BYTES BOX ══ -->
  <rect x="318" y="86" width="136" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="386" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Payload Bytes</text>
  <text x="386" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">51,200 bytes</text>

  <!-- Arrow: payload bytes → result (with ÷ 1024 label) -->
  <line x1="454" y1="112" x2="482" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="468" y="104" text-anchor="middle" font-size="9.5" fill="#64748b">÷ 1024</text>
  <text x="468" y="126" text-anchor="middle" font-size="9.5" fill="#64748b">→ KB / MB</text>

  <!-- ══ RESULT BOX ══ -->
  <rect x="484" y="86" width="168" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="568" y="108" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Payload Size</text>
  <text x="568" y="128" text-anchor="middle" font-size="16" fill="white" font-weight="700">50.00 KB</text>
</svg>
