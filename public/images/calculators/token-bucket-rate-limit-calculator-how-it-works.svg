<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" width="680" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Token bucket rate limit calculation flow diagram">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="84" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">TOKENS</text>
  <text x="8" y="166" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RATE</text>

  <!-- ══ TOKENS ROW ══ -->
  <!-- Current Tokens -->
  <rect x="58" y="50" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="72" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Current Tokens</text>
  <text x="122" y="90" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 80 tokens</text>

  <!-- Arrow: current tokens → check -->
  <line x1="186" y1="76" x2="262" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="224" y="67" text-anchor="middle" font-size="9.5" fill="#64748b">≥ request cost?</text>
  <text x="224" y="89" text-anchor="middle" font-size="9.5" fill="#64748b">wait = (cost−tokens)/rate</text>

  <!-- Allowed / Wait node -->
  <rect x="262" y="50" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="326" y="72" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Request Status</text>
  <text x="326" y="90" text-anchor="middle" font-size="11" fill="#3b82f6">Allowed / Wait Xs</text>

  <!-- ══ RATE ROW ══ -->
  <!-- Refill Rate -->
  <rect x="58" y="132" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="154" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Refill Rate</text>
  <text x="122" y="172" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 10 tokens/s</text>

  <!-- Arrow: refill rate → max rps -->
  <line x1="186" y1="158" x2="262" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="224" y="149" text-anchor="middle" font-size="9.5" fill="#64748b">÷ request cost</text>
  <text x="224" y="171" text-anchor="middle" font-size="9.5" fill="#64748b">max RPS</text>

  <!-- Max RPS node -->
  <rect x="262" y="132" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="326" y="154" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Max RPS</text>
  <text x="326" y="172" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 5 req/s</text>

  <!-- ══ CONVERGENCE LINES ══ -->
  <line x1="390" y1="76" x2="446" y2="114" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="390" y1="158" x2="446" y2="114" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="446" y1="114" x2="478" y2="114" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- merge circle -->
  <circle cx="446" cy="114" r="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="446" y="119" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">∑</text>

  <!-- ══ RESULT BOX ══ -->
  <rect x="478" y="88" width="182" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="569" y="109" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Token Bucket Result</text>
  <text x="569" y="129" text-anchor="middle" font-size="13" fill="white" font-weight="700">Allowed · 5 req/s · 10 burst</text>
</svg>
