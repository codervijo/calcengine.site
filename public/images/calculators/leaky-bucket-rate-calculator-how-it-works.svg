<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" width="720" height="230" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Leaky bucket rate calculation flow diagram: incoming rate and leak rate feed into the leaky bucket formula to produce effective throughput and drop rate">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Column labels ── -->
  <text x="86" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">INPUTS</text>
  <text x="360" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">LEAKY BUCKET</text>
  <text x="608" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">OUTPUTS</text>

  <!-- ══ INPUT: Incoming Rate ══ -->
  <rect x="24" y="30" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="86" y="52" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Incoming Rate</text>
  <text x="86" y="70" text-anchor="middle" font-size="11" fill="#3b82f6">λ = 15 req/s</text>

  <!-- ══ INPUT: Leak Rate ══ -->
  <rect x="24" y="100" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="86" y="122" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Leak Rate</text>
  <text x="86" y="140" text-anchor="middle" font-size="11" fill="#3b82f6">R = 10 req/s</text>

  <!-- ══ INPUT: Bucket Capacity ══ -->
  <rect x="24" y="170" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="86" y="192" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Bucket Capacity</text>
  <text x="86" y="210" text-anchor="middle" font-size="11" fill="#3b82f6">C = 100 req</text>

  <!-- Arrows: inputs → bucket box -->
  <line x1="148" y1="56" x2="270" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="148" y1="126" x2="270" y2="116" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="148" y1="196" x2="270" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ LEAKY BUCKET box ══ -->
  <rect x="270" y="76" width="180" height="78" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="101" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="700">Leaky Bucket</text>
  <text x="360" y="119" text-anchor="middle" font-size="10" fill="#64748b">throughput = min(λ, R)</text>
  <text x="360" y="134" text-anchor="middle" font-size="10" fill="#64748b">drop rate = max(0, λ − R)</text>
  <text x="360" y="149" text-anchor="middle" font-size="10" fill="#64748b">fill time = C ÷ (λ − R)</text>

  <!-- Arrows: bucket → outputs -->
  <!-- Upper arrow to Throughput -->
  <line x1="450" y1="100" x2="524" y2="66" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Middle arrow to Drop Rate -->
  <line x1="450" y1="115" x2="524" y2="136" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Lower arrow to Fill Time -->
  <line x1="450" y1="130" x2="524" y2="196" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ OUTPUT: Effective Throughput ══ -->
  <rect x="524" y="30" width="168" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="608" y="52" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Effective Throughput</text>
  <text x="608" y="70" text-anchor="middle" font-size="15" fill="white" font-weight="700">10 req/s</text>

  <!-- ══ OUTPUT: Drop Rate ══ -->
  <rect x="524" y="110" width="168" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="608" y="132" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Drop Rate</text>
  <text x="608" y="150" text-anchor="middle" font-size="15" fill="white" font-weight="700">5 req/s</text>

  <!-- ══ OUTPUT: Bucket Fill Time ══ -->
  <rect x="524" y="170" width="168" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="608" y="192" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Bucket Fill Time</text>
  <text x="608" y="210" text-anchor="middle" font-size="15" fill="white" font-weight="700">20 s</text>
</svg>
