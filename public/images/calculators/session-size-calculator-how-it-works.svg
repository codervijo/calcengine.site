<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Session size calculation flow diagram showing system prompt tokens and per-turn tokens summing to total session tokens and context window usage">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">FIXED</text>
  <text x="8" y="100" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">OVERHEAD</text>
  <text x="8" y="168" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">PER-TURN</text>

  <!-- ══ FIXED ROW — System Prompt ══ -->
  <rect x="72" y="50" width="140" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="142" y="72" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">System Prompt</text>
  <text x="142" y="90" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 500 tokens</text>

  <!-- Arrow: system → sum -->
  <line x1="212" y1="76" x2="310" y2="116" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ PER-TURN ROW ══ -->
  <!-- User Tokens -->
  <rect x="72" y="124" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="134" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">User Message</text>
  <text x="134" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">150 tokens</text>

  <!-- Arrow: user → multiplier -->
  <line x1="196" y1="150" x2="240" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Turns multiplier box -->
  <rect x="240" y="128" width="100" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="147" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">× Turns</text>
  <text x="290" y="163" text-anchor="middle" font-size="10" fill="#3b82f6">e.g. × 10</text>

  <!-- Arrow: assistant input -->
  <rect x="72" y="186" width="140" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="142" y="204" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Asst. Message</text>
  <text x="142" y="220" text-anchor="middle" font-size="11" fill="#3b82f6">300 tokens</text>
  <line x1="212" y1="208" x2="240" y2="172" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: multiplier → sum -->
  <line x1="340" y1="150" x2="370" y2="132" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ SUM CIRCLE ══ -->
  <circle cx="382" cy="120" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="382" y="125" text-anchor="middle" font-size="14" fill="#64748b" font-weight="500">+</text>

  <!-- Arrow: sum → total -->
  <line x1="396" y1="120" x2="430" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ TOTAL TOKENS ══ -->
  <rect x="430" y="88" width="150" height="64" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="505" y="111" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Total Session</text>
  <text x="505" y="128" text-anchor="middle" font-size="18" fill="white" font-weight="700">5,000</text>
  <text x="505" y="145" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">tokens</text>

  <!-- Arrow: total → context % -->
  <line x1="580" y1="120" x2="616" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ CONTEXT USAGE ══ -->
  <rect x="616" y="88" width="90" height="64" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="661" y="111" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Context Used</text>
  <text x="661" y="130" text-anchor="middle" font-size="16" fill="#1565c0" font-weight="700">3.9%</text>
  <text x="661" y="146" text-anchor="middle" font-size="9.5" fill="#64748b">of 128k window</text>
</svg>
