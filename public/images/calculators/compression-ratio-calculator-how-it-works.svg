<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Compression ratio calculation flow diagram">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="12" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">ORIGINAL</text>
  <text x="12" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">COMPRESSED</text>

  <!-- ══ ORIGINAL SIZE ROW ══ -->
  <rect x="82" y="48" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="147" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Original Size</text>
  <text x="147" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,024 KB</text>

  <!-- Arrow: original → divide -->
  <line x1="212" y1="74" x2="268" y2="74" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="65" text-anchor="middle" font-size="9.5" fill="#64748b">feeds into</text>
  <text x="240" y="87" text-anchor="middle" font-size="9.5" fill="#64748b">numerator</text>

  <!-- ══ COMPRESSED SIZE ROW ══ -->
  <rect x="82" y="124" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="147" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Compressed Size</text>
  <text x="147" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 256 KB</text>

  <!-- Arrow: compressed → divide -->
  <line x1="212" y1="150" x2="268" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="141" text-anchor="middle" font-size="9.5" fill="#64748b">feeds into</text>
  <text x="240" y="163" text-anchor="middle" font-size="9.5" fill="#64748b">denominator</text>

  <!-- ══ DIVIDE BOX ══ -->
  <rect x="268" y="86" width="100" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="318" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Original</text>
  <line x1="284" y1="113" x2="352" y2="113" stroke="#1e40af" stroke-width="1.5"/>
  <text x="318" y="128" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Compressed</text>

  <!-- Converge lines from rows to divide box -->
  <line x1="268" y1="74" x2="268" y2="90" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="268" y1="150" x2="268" y2="134" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Arrow: divide → results -->
  <line x1="368" y1="112" x2="416" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULTS COLUMN ══ -->
  <!-- Compression Ratio result -->
  <rect x="416" y="68" width="244" height="88" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="538" y="91" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="500">Compression Ratio</text>
  <text x="538" y="115" text-anchor="middle" font-size="22" fill="white" font-weight="700">4.00:1</text>
  <line x1="432" y1="124" x2="644" y2="124" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="476" y="143" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">Space Saved</text>
  <text x="476" y="156" text-anchor="middle" font-size="13" fill="white" font-weight="600">75.0%</text>
  <text x="600" y="143" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">Reduced By</text>
  <text x="600" y="156" text-anchor="middle" font-size="13" fill="white" font-weight="600">768 KB</text>
</svg>
