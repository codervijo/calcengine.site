<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="QPS calculation flow: total requests and time window divide to produce average QPS, which multiplies by peak multiplier to produce peak QPS">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82"  font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">REQUESTS</text>
  <text x="8" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">WINDOW</text>

  <!-- ══ INPUT: Total Requests ══ -->
  <rect x="72" y="48" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Requests</text>
  <text x="136" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,000,000</text>

  <!-- ══ INPUT: Time Window ══ -->
  <rect x="72" y="124" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Time Window</text>
  <text x="136" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">86,400 s (1 day)</text>

  <!-- ══ CONVERGENCE → divide ══ -->
  <line x1="200" y1="74"  x2="262" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="200" y1="150" x2="262" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="262" y1="112" x2="292" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷ node -->
  <circle cx="262" cy="112" r="13" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="262" y="118" text-anchor="middle" font-size="15" fill="#64748b" font-weight="500">÷</text>

  <!-- ══ Average QPS ══ -->
  <rect x="292" y="86" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="356" y="107" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Average QPS</text>
  <text x="356" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">11.57 QPS</text>

  <!-- Arrow → × node -->
  <line x1="420" y1="112" x2="460" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="104" text-anchor="middle" font-size="9.5" fill="#64748b">× peak</text>
  <text x="440" y="126" text-anchor="middle" font-size="9.5" fill="#64748b">multiplier</text>

  <!-- ══ Peak QPS result ══ -->
  <rect x="460" y="86" width="164" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="542" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Peak QPS</text>
  <text x="542" y="127" text-anchor="middle" font-size="16" fill="white" font-weight="700">34.72 QPS</text>

  <!-- Peak Multiplier input label -->
  <rect x="460" y="152" width="164" height="32" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="542" y="173" text-anchor="middle" font-size="11" fill="#1e40af">Peak Multiplier: 3×</text>
  <!-- arrow from multiplier box up to result box -->
  <line x1="542" y1="152" x2="542" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
