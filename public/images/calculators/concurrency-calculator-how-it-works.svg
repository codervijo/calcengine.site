<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Concurrency calculation flow diagram: RPS and average latency multiplied together to produce required concurrency">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="12" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RPS</text>
  <text x="12" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">LATENCY</text>

  <!-- ══ RPS ROW ══ -->
  <!-- RPS input node -->
  <rect x="60" y="48" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Requests / Second</text>
  <text x="125" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 100 RPS</text>

  <!-- Arrow: RPS → multiply node -->
  <line x1="190" y1="74" x2="260" y2="112" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ LATENCY ROW ══ -->
  <!-- Latency input node -->
  <rect x="60" y="124" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Avg Response Time</text>
  <text x="125" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 200 ms</text>

  <!-- Arrow: Latency → multiply node -->
  <line x1="190" y1="150" x2="260" y2="112" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ÷ 1000 label on latency arrow -->
  <text x="215" y="142" text-anchor="middle" font-size="9.5" fill="#64748b">÷ 1000</text>
  <text x="215" y="154" text-anchor="middle" font-size="9.5" fill="#64748b">= 0.2 s</text>

  <!-- ══ MULTIPLY NODE ══ -->
  <circle cx="272" cy="112" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="272" y="117" text-anchor="middle" font-size="14" fill="#64748b" font-weight="600">×</text>

  <!-- Arrow: multiply → base concurrency -->
  <line x1="286" y1="112" x2="340" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ BASE CONCURRENCY ══ -->
  <rect x="340" y="86" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="405" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Base Concurrency</text>
  <text x="405" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">100 × 0.2 = 20</text>

  <!-- Arrow: base → safety multiply -->
  <line x1="470" y1="112" x2="500" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="483" y="104" text-anchor="middle" font-size="9.5" fill="#64748b">× 1.5×</text>
  <text x="483" y="116" text-anchor="middle" font-size="9.5" fill="#64748b">safety</text>

  <!-- Arrow → result -->
  <line x1="500" y1="112" x2="524" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT NODE ══ -->
  <rect x="524" y="86" width="140" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="594" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Required Concurrency</text>
  <text x="594" y="127" text-anchor="middle" font-size="18" fill="white" font-weight="700">30</text>
</svg>
