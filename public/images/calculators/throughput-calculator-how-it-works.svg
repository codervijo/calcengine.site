<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Throughput calculation flow diagram: total requests and time window produce RPS, which combined with payload size produces data throughput">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="12" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">REQUESTS</text>
  <text x="12" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">TIME</text>

  <!-- ══ REQUESTS ROW ══ -->
  <!-- Total Requests -->
  <rect x="60" y="48" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Requests</text>
  <text x="122" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 10,000</text>

  <!-- Arrow: requests → RPS box -->
  <line x1="184" y1="74" x2="258" y2="112" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ TIME ROW ══ -->
  <!-- Time Window -->
  <rect x="60" y="124" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Time Window</text>
  <text x="122" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 60 s</text>

  <!-- Arrow: time → RPS box -->
  <line x1="184" y1="150" x2="258" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- merge → RPS -->
  <line x1="258" y1="112" x2="276" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷ label at merge -->
  <circle cx="258" cy="112" r="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="258" y="117" text-anchor="middle" font-size="13" fill="#64748b" font-weight="500">÷</text>

  <!-- ══ RPS ══ -->
  <rect x="276" y="86" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="338" y="107" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Throughput</text>
  <text x="338" y="125" text-anchor="middle" font-size="11" fill="#3b82f6">166.67 RPS</text>

  <!-- Arrow: RPS → multiply payload -->
  <line x1="400" y1="112" x2="440" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="104" text-anchor="middle" font-size="9.5" fill="#64748b">× payload</text>
  <text x="420" y="128" text-anchor="middle" font-size="9.5" fill="#64748b">÷ 1,024</text>

  <!-- ══ PAYLOAD SIZE node (below) ══ -->
  <rect x="300" y="168" width="100" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="183" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Payload Size</text>
  <text x="350" y="199" text-anchor="middle" font-size="10" fill="#3b82f6">e.g. 4 KB</text>

  <!-- Arrow: payload → join point -->
  <line x1="350" y1="168" x2="420" y2="128" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ DATA THROUGHPUT (result) ══ -->
  <rect x="440" y="86" width="200" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="540" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Data Throughput</text>
  <text x="540" y="127" text-anchor="middle" font-size="16" fill="white" font-weight="700">0.651 MB/s</text>
</svg>
