<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="CPU usage estimation flow: requests per second and CPU ms per request multiplied, divided by cores × 1000, yielding CPU usage percentage">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RATE</text>
  <text x="8" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">CORES</text>

  <!-- ══ TOP ROW ══ -->
  <!-- RPS node -->
  <rect x="52" y="48" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Requests/sec</text>
  <text x="112" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 100 RPS</text>

  <!-- Arrow: RPS → multiply node -->
  <line x1="172" y1="74" x2="234" y2="74" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CPU ms node -->
  <rect x="234" y="48" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="294" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">CPU ms/req</text>
  <text x="294" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 5 ms</text>

  <!-- Arrow: CPU ms → × node -->
  <line x1="354" y1="74" x2="402" y2="98" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ BOTTOM ROW ══ -->
  <!-- Cores node -->
  <rect x="52" y="124" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">CPU Cores</text>
  <text x="112" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 4 cores</text>

  <!-- Arrow: Cores → × node label -->
  <line x1="172" y1="150" x2="234" y2="150" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- × 1000 ms node -->
  <rect x="234" y="124" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="294" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">× 1000 ms/s</text>
  <text x="294" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">4,000 ms/s cap</text>

  <!-- Arrow: capacity → ÷ node -->
  <line x1="354" y1="150" x2="402" y2="126" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ÷ merge node -->
  <circle cx="414" cy="112" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="414" y="117" text-anchor="middle" font-size="13" fill="#64748b" font-weight="600">÷</text>

  <!-- Arrow: ÷ → result -->
  <line x1="428" y1="112" x2="468" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="448" y="105" text-anchor="middle" font-size="9" fill="#64748b">× 100</text>

  <!-- ══ RESULT ══ -->
  <rect x="468" y="86" width="216" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="576" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">CPU Usage</text>
  <text x="576" y="127" text-anchor="middle" font-size="18" fill="white" font-weight="700">12.5%</text>
</svg>
