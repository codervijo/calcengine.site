<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Latency budget calculation flow diagram: service components sum to total used, compared against total budget to yield remaining headroom">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Column labels ── -->
  <text x="74" y="16" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5" text-anchor="middle">COMPONENTS</text>
  <text x="390" y="16" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5" text-anchor="middle">TOTAL USED</text>
  <text x="580" y="16" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5" text-anchor="middle">SLA BUDGET</text>

  <!-- ══ SERVICE COMPONENT BOXES ══ -->
  <!-- Component 1 -->
  <rect x="14" y="26" width="120" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="74" y="42" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">DNS / Network</text>
  <text x="74" y="56" text-anchor="middle" font-size="10" fill="#3b82f6">50 ms</text>

  <!-- Component 2 -->
  <rect x="14" y="72" width="120" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="74" y="88" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Auth Service</text>
  <text x="74" y="102" text-anchor="middle" font-size="10" fill="#3b82f6">30 ms</text>

  <!-- Component 3 -->
  <rect x="14" y="118" width="120" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="74" y="134" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">API Handler</text>
  <text x="74" y="148" text-anchor="middle" font-size="10" fill="#3b82f6">150 ms</text>

  <!-- Component 4 -->
  <rect x="14" y="164" width="120" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="74" y="180" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Database</text>
  <text x="74" y="194" text-anchor="middle" font-size="10" fill="#3b82f6">100 ms</text>

  <!-- Component 5 -->
  <rect x="14" y="210" width="120" height="24" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="74" y="226" text-anchor="middle" font-size="10" fill="#64748b">+ more…</text>

  <!-- ══ ARROWS: components → sum node ══ -->
  <line x1="134" y1="44" x2="244" y2="118" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="134" y1="90" x2="244" y2="118" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="134" y1="136" x2="244" y2="118" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="134" y1="182" x2="244" y2="118" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- ══ SUM NODE ══ -->
  <circle cx="256" cy="118" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="256" y="124" text-anchor="middle" font-size="15" fill="#64748b" font-weight="600">Σ</text>

  <!-- ══ TOTAL USED BOX ══ -->
  <line x1="270" y1="118" x2="330" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="330" y="90" width="120" height="56" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="113" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Used</text>
  <text x="390" y="133" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="700">350 ms</text>

  <!-- ══ MINUS NODE ══ -->
  <line x1="450" y1="118" x2="488" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="500" cy="118" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="123" text-anchor="middle" font-size="17" fill="#64748b" font-weight="400">−</text>

  <!-- ══ BUDGET INPUT ══ -->
  <rect x="452" y="36" width="96" height="44" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="56" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">SLA Budget</text>
  <text x="500" y="72" text-anchor="middle" font-size="13" fill="#3b82f6" font-weight="700">500 ms</text>
  <!-- Arrow: budget → minus node -->
  <line x1="500" y1="80" x2="500" y2="104" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT ARROW ══ -->
  <line x1="514" y1="118" x2="552" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ REMAINING BUDGET (RESULT) ══ -->
  <rect x="552" y="86" width="152" height="64" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="628" y="108" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="500">Remaining Budget</text>
  <text x="628" y="132" text-anchor="middle" font-size="18" fill="white" font-weight="700">150 ms</text>
</svg>
