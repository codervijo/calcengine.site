<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Memory usage calculation flow: items and bytes per item multiplied, overhead applied, replicas multiplied to produce total memory">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">ITEMS</text>
  <text x="8" y="168" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">SIZE</text>

  <!-- ══ TOP ROW: Items ══ -->
  <rect x="52" y="48" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="114" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Items</text>
  <text x="114" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,000,000</text>

  <!-- Arrow items → raw memory -->
  <line x1="176" y1="74" x2="248" y2="74" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="212" y="65" text-anchor="middle" font-size="9.5" fill="#64748b">×</text>
  <text x="212" y="87" text-anchor="middle" font-size="9.5" fill="#64748b">bytes/item</text>

  <!-- ══ BOTTOM ROW: Bytes per Item ══ -->
  <rect x="52" y="134" width="124" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="114" y="156" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Bytes / Item</text>
  <text x="114" y="174" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 256 B</text>

  <!-- Arrow bytes → raw memory (converge) -->
  <line x1="176" y1="150" x2="248" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Merge circle -->
  <circle cx="260" cy="112" r="13" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="260" y="117" text-anchor="middle" font-size="14" fill="#64748b" font-weight="500">×</text>
  <line x1="248" y1="74" x2="249" y2="100" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="248" y1="150" x2="249" y2="124" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="273" y1="112" x2="308" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RAW MEMORY ══ -->
  <rect x="308" y="86" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="368" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Raw Memory</text>
  <text x="368" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">~244 MB</text>

  <!-- Arrow raw → with overhead -->
  <line x1="428" y1="112" x2="488" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="458" y="103" text-anchor="middle" font-size="9.5" fill="#64748b">× (1 +</text>
  <text x="458" y="125" text-anchor="middle" font-size="9.5" fill="#64748b">overhead%)</text>

  <!-- ══ WITH OVERHEAD ══ -->
  <rect x="488" y="86" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="548" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">+ Overhead</text>
  <text x="548" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">~293 MB</text>

  <!-- Arrow with overhead → total -->
  <line x1="608" y1="112" x2="648" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="628" y="103" text-anchor="middle" font-size="9.5" fill="#64748b">×</text>
  <text x="628" y="125" text-anchor="middle" font-size="9.5" fill="#64748b">replicas</text>

  <!-- ══ TOTAL MEMORY ══ -->
  <rect x="648" y="86" width="100" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="698" y="108" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Total RAM</text>
  <text x="698" y="128" text-anchor="middle" font-size="15" fill="white" font-weight="700">~878 MB</text>
</svg>
