<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Pagination performance calculation flow: inputs flow into offset and slowdown formulas, then into offset and cursor query time results">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Column labels ── -->
  <text x="82" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">INPUTS</text>
  <text x="310" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">DERIVED</text>
  <text x="575" y="18" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RESULTS</text>

  <!-- ══ INPUT NODES ══ -->
  <!-- Total Records -->
  <rect x="20" y="28" width="124" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="82" y="48" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Total Records</text>
  <text x="82" y="65" text-anchor="middle" font-size="10.5" fill="#3b82f6">e.g. 1,000,000</text>

  <!-- Page Size -->
  <rect x="20" y="96" width="124" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="82" y="116" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Page Size</text>
  <text x="82" y="133" text-anchor="middle" font-size="10.5" fill="#3b82f6">e.g. 25 rows</text>

  <!-- Page Number -->
  <rect x="20" y="164" width="124" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="82" y="184" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Page Number</text>
  <text x="82" y="201" text-anchor="middle" font-size="10.5" fill="#3b82f6">e.g. 500</text>

  <!-- ══ ARROWS: inputs → derived ══ -->
  <!-- Total Records + Page Size → Total Pages -->
  <line x1="144" y1="52" x2="210" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="120" x2="210" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Page Size + Page Number → Offset -->
  <line x1="144" y1="125" x2="210" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="185" x2="210" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ DERIVED NODES ══ -->
  <!-- Total Pages -->
  <rect x="210" y="60" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="80" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Total Pages</text>
  <text x="275" y="97" text-anchor="middle" font-size="10.5" fill="#3b82f6">⌈records ÷ size⌉</text>

  <!-- Offset -->
  <rect x="210" y="148" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="168" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Offset</text>
  <text x="275" y="185" text-anchor="middle" font-size="10.5" fill="#3b82f6">(page−1) × size</text>

  <!-- ══ ARROWS: derived → results ══ -->
  <!-- Total Pages → top result -->
  <line x1="340" y1="84" x2="460" y2="72" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Offset → middle result (slowdown) -->
  <line x1="340" y1="172" x2="460" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Offset → bottom result (offset time) -->
  <line x1="340" y1="180" x2="460" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT NODES ══ -->
  <!-- Total Pages result -->
  <rect x="460" y="50" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="70" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Total Pages</text>
  <text x="525" y="87" text-anchor="middle" font-size="10.5" fill="#3b82f6">40,000</text>

  <!-- Arrows: results → final output -->
  <line x1="590" y1="74" x2="628" y2="100" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="590" y1="162" x2="628" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="590" y1="212" x2="628" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Slowdown Factor result -->
  <rect x="460" y="120" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="140" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Slowdown Factor</text>
  <text x="525" y="157" text-anchor="middle" font-size="10.5" fill="#3b82f6">500×</text>

  <!-- Offset Query Time result -->
  <rect x="460" y="190" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="210" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Offset Query</text>
  <text x="525" y="227" text-anchor="middle" font-size="10.5" fill="#3b82f6">2,500 ms</text>

  <!-- ══ FINAL OUTPUT: Cursor Query Time (constant) ══ -->
  <rect x="628" y="108" width="78" height="62" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="667" y="131" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="500">Cursor</text>
  <text x="667" y="147" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="500">Query</text>
  <text x="667" y="163" text-anchor="middle" font-size="13" fill="white" font-weight="700">5 ms</text>
</svg>
