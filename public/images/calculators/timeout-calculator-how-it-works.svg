<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Timeout calculation flow diagram: P99 latency and safety multiplier produce recommended timeout, which combined with retries gives total deadline">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">LATENCY</text>
  <text x="8" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">MULTIPLIER</text>

  <!-- ══ P99 Latency ══ -->
  <rect x="72" y="48" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">P99 Latency</text>
  <text x="136" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 200 ms</text>

  <!-- ══ Safety Multiplier ══ -->
  <rect x="72" y="124" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Safety Multiplier</text>
  <text x="136" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 2.0×</text>

  <!-- Convergence lines to × node -->
  <line x1="200" y1="74" x2="278" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="200" y1="150" x2="278" y2="114" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- × merge node -->
  <circle cx="290" cy="112" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="118" text-anchor="middle" font-size="14" fill="#64748b" font-weight="600">×</text>

  <!-- Arrow: × → Recommended Timeout -->
  <line x1="304" y1="112" x2="348" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Recommended Timeout ══ -->
  <rect x="348" y="86" width="148" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="422" y="108" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Rec. Timeout</text>
  <text x="422" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">400 ms / attempt</text>

  <!-- ── Retries label ── -->
  <text x="8" y="208" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RETRIES</text>

  <!-- ══ Retries ══ -->
  <rect x="72" y="178" width="128" height="32" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="136" y="199" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Retries: 2  →  ×3</text>

  <!-- Line: Retries → × node 2 -->
  <line x1="200" y1="194" x2="560" y2="158" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Line: Recommended Timeout → × node 2 -->
  <line x1="496" y1="112" x2="560" y2="138" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- × merge node 2 -->
  <circle cx="568" cy="150" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="568" y="156" text-anchor="middle" font-size="14" fill="#64748b" font-weight="600">×</text>

  <!-- Arrow: × node 2 → Total Deadline -->
  <line x1="582" y1="150" x2="602" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Total Deadline ══ -->
  <rect x="602" y="124" width="106" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="655" y="146" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="500">Total Deadline</text>
  <text x="655" y="165" text-anchor="middle" font-size="15" fill="white" font-weight="700">1,200 ms</text>
</svg>
