<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="API pagination limit calculation flow diagram showing total records and page size combining into total pages, then dividing by rate limit to produce fetch time">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">RECORDS</text>
  <text x="8" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">PAGE SIZE</text>

  <!-- ══ RECORDS ROW ══ -->
  <!-- Total Records node -->
  <rect x="72" y="48" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Records</text>
  <text x="137" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 10,000</text>

  <!-- Arrow: records → divide -->
  <line x1="202" y1="74" x2="274" y2="112" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ PAGE SIZE ROW ══ -->
  <!-- Page Size node -->
  <rect x="72" y="124" width="130" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Page Size</text>
  <text x="137" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 100</text>

  <!-- Arrow: page size → divide -->
  <line x1="202" y1="150" x2="274" y2="112" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ÷ merge node -->
  <circle cx="274" cy="112" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="274" y="117" text-anchor="middle" font-size="15" fill="#64748b" font-weight="500">÷</text>

  <!-- Arrow: divide → Total Pages -->
  <line x1="288" y1="112" x2="332" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="104" text-anchor="middle" font-size="9" fill="#64748b">⌈ ceil ⌉</text>

  <!-- ══ TOTAL PAGES ══ -->
  <rect x="332" y="86" width="128" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="396" y="107" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Pages</text>
  <text x="396" y="125" text-anchor="middle" font-size="11" fill="#3b82f6">100 requests</text>

  <!-- Arrow: Total Pages → divide by rate -->
  <line x1="460" y1="112" x2="500" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="480" y="104" text-anchor="middle" font-size="9" fill="#64748b">÷ rate</text>

  <!-- ── Rate Limit label (below arrow) ── -->
  <text x="480" y="140" text-anchor="middle" font-size="9.5" fill="#64748b">Rate Limit</text>
  <text x="480" y="152" text-anchor="middle" font-size="9.5" fill="#3b82f6">10 req/s</text>

  <!-- ══ FETCH TIME (result) ══ -->
  <rect x="500" y="86" width="188" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="594" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Fetch Time</text>
  <text x="594" y="127" text-anchor="middle" font-size="16" fill="white" font-weight="700">10 seconds</text>
</svg>
