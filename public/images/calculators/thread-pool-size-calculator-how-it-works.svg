<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Thread pool size calculation flow diagram showing inputs feeding into the Brian Goetz formula to produce the recommended pool size">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="68" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">CORES</text>
  <text x="8" y="128" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">UTIL%</text>
  <text x="8" y="183" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">W / C</text>

  <!-- ══ INPUT: CPU Cores ══ -->
  <rect x="60" y="40" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="62" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">CPU Cores</text>
  <text x="120" y="80" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 8</text>

  <!-- ══ INPUT: Utilization ══ -->
  <rect x="60" y="104" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="126" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">CPU Utilization</text>
  <text x="120" y="144" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 80%</text>

  <!-- ══ INPUT: Wait / Compute ══ -->
  <rect x="60" y="160" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="182" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Wait / Compute</text>
  <text x="120" y="200" text-anchor="middle" font-size="11" fill="#3b82f6">200 ms / 20 ms</text>

  <!-- Arrows from inputs to formula box -->
  <line x1="180" y1="66" x2="270" y2="108" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="130" x2="270" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="186" x2="270" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ FORMULA BOX ══ -->
  <rect x="272" y="84" width="192" height="72" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="368" y="106" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Goetz Formula</text>
  <text x="368" y="123" text-anchor="middle" font-size="10" fill="#3b82f6">Cores × Util × (1 + W/C)</text>
  <text x="368" y="141" text-anchor="middle" font-size="10" fill="#64748b">8 × 0.80 × (1 + 10)</text>

  <!-- Arrow: formula → result -->
  <line x1="464" y1="120" x2="520" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT ══ -->
  <rect x="522" y="90" width="168" height="60" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="606" y="114" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Thread Pool Size</text>
  <text x="606" y="138" text-anchor="middle" font-size="20" fill="white" font-weight="700">71 threads</text>
</svg>
