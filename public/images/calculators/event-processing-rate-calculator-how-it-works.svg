<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Event processing rate calculation flow: total events, processing time, and workers combine to produce throughput and drain time">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="10" y="62" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">VOLUME</text>
  <text x="10" y="136" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">LATENCY</text>
  <text x="10" y="212" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">WORKERS</text>

  <!-- ══ INPUT BOXES ══ -->

  <!-- Total Events -->
  <rect x="62" y="36" width="138" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="131" y="58" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Total Events</text>
  <text x="131" y="76" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,000,000</text>

  <!-- Processing Time -->
  <rect x="62" y="110" width="138" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="131" y="132" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Processing Time</text>
  <text x="131" y="150" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 5 ms / event</text>

  <!-- Workers -->
  <rect x="62" y="184" width="138" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="131" y="206" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Workers</text>
  <text x="131" y="224" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 10 consumers</text>

  <!-- ══ CONNECTOR LINES → merge circle at (390, 130) ══ -->

  <!-- Total Events (center: 131, 62) → merge at (376, 130) -->
  <line x1="200" y1="62" x2="376" y2="124" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="282" y="82" text-anchor="middle" font-size="9" fill="#94a3b8">volume</text>

  <!-- Processing Time (center: 131, 136) → merge at (376, 130) -->
  <line x1="200" y1="136" x2="376" y2="132" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="240" y="117" text-anchor="middle" font-size="9" fill="#94a3b8">÷ ms</text>

  <!-- Workers (center: 131, 210) → merge at (376, 136) -->
  <line x1="200" y1="210" x2="376" y2="138" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="282" y="195" text-anchor="middle" font-size="9" fill="#94a3b8">× workers</text>

  <!-- ══ MERGE CIRCLE ══ -->
  <circle cx="390" cy="130" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="135" text-anchor="middle" font-size="13" fill="#64748b" font-weight="500">=</text>

  <!-- Arrow from merge → result box -->
  <line x1="404" y1="130" x2="438" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT BOX ══ -->
  <rect x="438" y="84" width="216" height="92" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="546" y="108" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Throughput</text>
  <text x="546" y="133" text-anchor="middle" font-size="20" fill="white" font-weight="700">2,000 ev/s</text>
  <text x="546" y="156" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">drain: 8.3 min for 1M events</text>
</svg>
