<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="RAID capacity calculation flow diagram showing inputs feeding into a RAID formula to produce usable capacity">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="68" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">DISKS</text>
  <text x="8" y="128" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">SIZE</text>
  <text x="8" y="194" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">LEVEL</text>

  <!-- ══ INPUT: Number of Disks ══ -->
  <rect x="56" y="44" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="121" y="65" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Number of Disks</text>
  <text x="121" y="83" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 4</text>

  <!-- ══ INPUT: Disk Size ══ -->
  <rect x="56" y="106" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="121" y="127" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Disk Size</text>
  <text x="121" y="145" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 4 TB each</text>

  <!-- ══ INPUT: RAID Level ══ -->
  <rect x="56" y="170" width="130" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="121" y="191" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">RAID Level</text>
  <text x="121" y="209" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. RAID 5</text>

  <!-- Arrows from inputs → merge point -->
  <line x1="186" y1="68" x2="336" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="186" y1="130" x2="336" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="186" y1="194" x2="336" y2="120" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ FORMULA BOX ══ -->
  <rect x="336" y="86" width="156" height="68" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="414" y="108" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">RAID Formula</text>
  <text x="414" y="126" text-anchor="middle" font-size="10" fill="#3b82f6">(n − parity) × size</text>
  <text x="414" y="143" text-anchor="middle" font-size="10" fill="#64748b">e.g. (4−1) × 4 TB</text>

  <!-- Arrow: formula → result -->
  <line x1="492" y1="120" x2="542" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ RESULT: Usable Capacity ══ -->
  <rect x="542" y="86" width="152" height="68" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="618" y="111" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Usable Capacity</text>
  <text x="618" y="133" text-anchor="middle" font-size="18" fill="white" font-weight="700">12 TB</text>
  <text x="618" y="148" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">75% efficiency</text>
</svg>
