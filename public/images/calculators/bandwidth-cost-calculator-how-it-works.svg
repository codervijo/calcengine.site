<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Bandwidth cost calculation flow diagram: monthly transfer minus free tier equals billable GB, multiplied by price per GB equals monthly cost">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <!-- Soft shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="82" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">TRANSFER</text>
  <text x="8" y="158" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.5">PRICE</text>

  <!-- ══ TRANSFER ROW ══ -->
  <!-- Monthly Transfer -->
  <rect x="72" y="48" width="136" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Monthly Transfer</text>
  <text x="140" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">e.g. 1,000 GB</text>

  <!-- Arrow: transfer → billable -->
  <line x1="208" y1="74" x2="282" y2="74" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="245" y="65" text-anchor="middle" font-size="9.5" fill="#64748b">− Free Tier</text>
  <text x="245" y="87" text-anchor="middle" font-size="9.5" fill="#64748b">= Billable GB</text>

  <!-- Billable GB -->
  <rect x="282" y="48" width="120" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="342" y="70" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Billable GB</text>
  <text x="342" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">900 GB</text>

  <!-- ══ PRICE ROW ══ -->
  <!-- Price per GB -->
  <rect x="72" y="124" width="136" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="146" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">Price per GB</text>
  <text x="140" y="164" text-anchor="middle" font-size="11" fill="#3b82f6">$0.09 / GB</text>

  <!-- ══ CONVERGENCE LINES ══ -->
  <!-- Billable GB → merge point -->
  <line x1="402" y1="74" x2="464" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Price per GB → merge point -->
  <line x1="208" y1="150" x2="464" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- merge → Monthly Cost -->
  <line x1="476" y1="112" x2="514" y2="112" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- × label at merge -->
  <circle cx="464" cy="112" r="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="464" y="117" text-anchor="middle" font-size="14" fill="#64748b" font-weight="500">×</text>

  <!-- ══ MONTHLY COST ══ -->
  <rect x="514" y="86" width="180" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="604" y="107" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="500">Monthly Cost</text>
  <text x="604" y="127" text-anchor="middle" font-size="16" fill="white" font-weight="700">$81.00</text>
</svg>
