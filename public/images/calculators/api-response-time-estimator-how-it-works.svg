<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260" font-family="Inter, system-ui, sans-serif" role="img" aria-label="API response time estimation flow diagram: four input components combined into total response time">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Row labels ── -->
  <text x="8" y="50"  font-size="9" fill="#94a3b8" font-weight="500" letter-spacing="0.4">NETWORK</text>
  <text x="8" y="110" font-size="9" fill="#94a3b8" font-weight="500" letter-spacing="0.4">PROCESSING</text>
  <text x="8" y="170" font-size="9" fill="#94a3b8" font-weight="500" letter-spacing="0.4">TRANSFER</text>
  <text x="8" y="230" font-size="9" fill="#94a3b8" font-weight="500" letter-spacing="0.4">MIDDLEWARE</text>

  <!-- ══ ROW 1 — Network Latency ══ -->
  <rect x="80" y="28" width="140" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="49" text-anchor="middle" font-size="11.5" fill="#1e40af" font-weight="600">Network Latency</text>
  <text x="150" y="67" text-anchor="middle" font-size="10.5" fill="#3b82f6">e.g. 20 ms</text>
  <line x1="220" y1="52" x2="390" y2="128" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ ROW 2 — Server Processing ══ -->
  <rect x="80" y="88" width="140" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="109" text-anchor="middle" font-size="11.5" fill="#1e40af" font-weight="600">Server Processing</text>
  <text x="150" y="127" text-anchor="middle" font-size="10.5" fill="#3b82f6">e.g. 50 ms</text>
  <line x1="220" y1="112" x2="390" y2="128" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ ROW 3 — Transfer Time ══ -->
  <rect x="80" y="148" width="140" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="169" text-anchor="middle" font-size="11.5" fill="#1e40af" font-weight="600">Transfer Time</text>
  <text x="150" y="187" text-anchor="middle" font-size="10.5" fill="#3b82f6">KB × 8 ÷ Mbps</text>
  <line x1="220" y1="172" x2="390" y2="128" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ ROW 4 — Middleware ══ -->
  <rect x="80" y="208" width="140" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="229" text-anchor="middle" font-size="11.5" fill="#1e40af" font-weight="600">Middleware</text>
  <text x="150" y="247" text-anchor="middle" font-size="10.5" fill="#3b82f6">layers × overhead</text>
  <line x1="220" y1="232" x2="390" y2="128" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ SUM NODE ══ -->
  <circle cx="402" cy="128" r="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="402" y="133" text-anchor="middle" font-size="15" fill="#64748b" font-weight="500">+</text>

  <!-- Arrow sum → result -->
  <line x1="416" y1="128" x2="456" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ TOTAL RESPONSE TIME ══ -->
  <rect x="456" y="102" width="200" height="52" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="556" y="123" text-anchor="middle" font-size="11.5" fill="rgba(255,255,255,0.85)" font-weight="500">Total Response Time</text>
  <text x="556" y="144" text-anchor="middle" font-size="17" fill="white" font-weight="700">81.00 ms</text>
</svg>
